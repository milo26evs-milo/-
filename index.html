<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>物理エンジン サイコロ(ビルド不要版)</title>
    <style>
      html, body { margin: 0; height: 100%; background: #111; overflow: hidden; }
      canvas { display: block; }
      #hint {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        color: #fff; font-family: sans-serif; font-size: 14px; opacity: 0.7;
        pointer-events: none;
      }
    </style>
    <!--
      import map: "three" や "cannon-es" と書くだけで
      CDN(esm.sh)から本体を読み込めるようにする設定。
      npm installの代わりに、この数行がライブラリの取得先を教えている。
    -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://esm.sh/three@0.160.0",
          "cannon-es": "https://esm.sh/cannon-es@0.20.0"
        }
      }
    </script>
  </head>
  <body>
    <div id="hint">画面をタップするとサイコロを振ります</div>

    <script type="module">
      import * as THREE from 'three';
      import * as CANNON from 'cannon-es';

      // ===== 1. three.js: 見た目のセットアップ =====
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x1a1a2e);

      const camera = new THREE.PerspectiveCamera(
        50,
        window.innerWidth / window.innerHeight,
        0.1,
        100
      );
      camera.position.set(0, 6, 8);
      camera.lookAt(0, 0, 0);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      document.body.appendChild(renderer.domElement);

      scene.add(new THREE.AmbientLight(0xffffff, 0.5));
      const light = new THREE.DirectionalLight(0xffffff, 1);
      light.position.set(5, 10, 5);
      light.castShadow = true;
      scene.add(light);

      const groundMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(10, 10),
        new THREE.MeshStandardMaterial({ color: 0x2d5f3f })
      );
      groundMesh.rotation.x = -Math.PI / 2;
      groundMesh.receiveShadow = true;
      scene.add(groundMesh);

      const diceSize = 1;
      const diceMesh = new THREE.Mesh(
        new THREE.BoxGeometry(diceSize, diceSize, diceSize),
        new THREE.MeshStandardMaterial({ color: 0xf5f0e6 })
      );
      diceMesh.castShadow = true;
      scene.add(diceMesh);

      // ===== 2. cannon-es: 物理演算のセットアップ =====
      const world = new CANNON.World({
        gravity: new CANNON.Vec3(0, -9.82, 0),
      });

      const groundBody = new CANNON.Body({
        type: CANNON.Body.STATIC,
        shape: new CANNON.Plane(),
      });
      groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
      world.addBody(groundBody);

      const diceBody = new CANNON.Body({
        mass: 1,
        shape: new CANNON.Box(
          new CANNON.Vec3(diceSize / 2, diceSize / 2, diceSize / 2)
        ),
        position: new CANNON.Vec3(0, 5, 0),
      });
      world.addBody(diceBody);

      function throwDice() {
        diceBody.position.set(0, 5, 0);
        diceBody.velocity.set(0, 0, 0);
        diceBody.angularVelocity.set(
          (Math.random() - 0.5) * 15,
          (Math.random() - 0.5) * 15,
          (Math.random() - 0.5) * 15
        );
      }
      throwDice();

      // ===== 3. 毎フレームのループ =====
      function animate() {
        requestAnimationFrame(animate);
        world.step(1 / 60);
        diceMesh.position.copy(diceBody.position);
        diceMesh.quaternion.copy(diceBody.quaternion);
        renderer.render(scene, camera);
      }
      animate();

      // ===== 4. 操作(クリック/タップ両対応) =====
      window.addEventListener('click', throwDice);
      window.addEventListener('touchstart', throwDice, { passive: true });

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
 </body>
</html>
